# Self-hosted CI for the ASCEND repo.
# Runs unit tests, lint, security scan, conflict-fixtures eval, and the
# paper analysis pipeline on every push and PR to main.

name: ASCEND Repo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ai-sync-tests:
    name: AI Sync — tests + lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: ai-sync
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: ai-sync
        run: ruff check ascend_sync tests
      - name: Pytest
        working-directory: ai-sync
        run: pytest -q

  bandit-self-scan:
    name: ASCEND self-scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit on ai-sync (own code must be clean)
        working-directory: ai-sync
        run: bandit -r ascend_sync -ll

  reproducibility-harness:
    name: Reproducibility harness — fixtures + statistics
    runs-on: ubuntu-latest
    needs: ai-sync-tests
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ai-sync
        working-directory: ai-sync
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Install evaluation deps
        working-directory: evaluation
        run: pip install -r requirements.txt
      - name: Conflict-fixtures benchmark — assert baseline
        run: |
          PYTHONPATH=ai-sync python examples/conflict-fixtures/run_fixtures.py \
            --quiet --check examples/conflict-fixtures/expected-results.json
      - name: Statistics pipeline — bit-exact reproduction
        working-directory: evaluation
        run: |
          python statistics.py --input aggregate-metrics.csv --output out.json
          diff <(python -m json.tool expected-synthetic-output.json) <(python -m json.tool out.json)

  validate-configs:
    name: Validate platform configurations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yamllint
        run: pip install yamllint
      - name: Run validator
        run: bash scripts/validate-config.sh
