# Self-hosted CI for the ASCEND repo itself.
# Runs tests and linting for the AI sync module.

name: ASCEND Repo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ai-sync-tests:
    name: AI Sync module tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: ai-sync
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: ai-sync
        run: ruff check ascend_sync tests
      - name: Pytest
        working-directory: ai-sync
        run: pytest -q

  validate-configs:
    name: Validate platform configurations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run validator
        run: bash scripts/validate-config.sh
