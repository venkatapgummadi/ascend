# ASCEND — Full four-layer DevSecOps pipeline for GitHub Actions
#
# This workflow implements the complete ASCEND framework as described in the
# research paper. It covers:
#   Layer 1: Source Analysis  (SAST + SCA + Secrets)
#   Layer 2: Build & Integration (Container + IaC + License)
#   Layer 3: Deployment Orchestration (Blue-Green / Canary + DAST)
#   Layer 4: AI Synchronization (triggered post-deployment)
#
# Secrets required:
#   SONAR_TOKEN, SONAR_HOST_URL
#   SNYK_TOKEN
#   AZURE_CREDENTIALS / AWS_ROLE_ARN (for deployment)
#   ASCEND_SYNC_WEBHOOK (for Layer 4 trigger)

name: ASCEND Full Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

env:
  ASCEND_QUALITY_GATE_MIN: "0.85"
  ASCEND_CRITICAL_THRESHOLD: "0"
  ASCEND_HIGH_THRESHOLD: "5"

jobs:

  # -------------------------------------------------------------------------
  # LAYER 1 — Source Analysis
  # Four parallel scans with fail-fast Quality Gate 1
  # -------------------------------------------------------------------------

  sast-codeql:
    name: "L1 / SAST — CodeQL"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, python, java]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  sast-semgrep:
    name: "L1 / SAST — Semgrep"
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep CI
        run: semgrep ci --config=p/ci --config=p/owasp-top-ten --config=p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  sast-sonarqube:
    name: "L1 / SAST — SonarQube"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca-snyk:
    name: "L1 / SCA — Snyk"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: snyk/actions/setup@master
      - name: Snyk test
        run: snyk test --severity-threshold=high --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  secret-scan:
    name: "L1 / Secrets — TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --fail

  quality-gate-1:
    name: "L1 / Quality Gate 1"
    needs: [sast-codeql, sast-semgrep, sast-sonarqube, sca-snyk, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Quality Gate 1
        run: |
          echo "::notice::Quality Gate 1 passed — all Layer 1 scans succeeded."
          echo "QG1_STATUS=pass" >> $GITHUB_ENV

  # -------------------------------------------------------------------------
  # LAYER 2 — Build & Integration
  # -------------------------------------------------------------------------

  container-scan:
    name: "L2 / Container — Trivy"
    needs: quality-gate-1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t ${{ github.repository }}:${{ github.sha }} .
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ github.repository }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  iac-scan:
    name: "L2 / IaC — Checkov"
    needs: quality-gate-1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,cloudformation,kubernetes,dockerfile
          output_format: sarif
          output_file_path: reports/checkov.sarif
          soft_fail: false
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/checkov.sarif

  license-check:
    name: "L2 / License Compliance"
    needs: quality-gate-1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fossas/fossa-action@main
        if: env.FOSSA_API_KEY != ''
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
      - name: Local license audit (fallback)
        if: env.FOSSA_API_KEY == ''
        run: |
          pip install pip-licenses --quiet
          pip-licenses --fail-on="GPL-3.0-only;AGPL-3.0-only;AGPL-3.0-or-later" --format=markdown > LICENSES.md
          cat LICENSES.md

  quality-gate-2:
    name: "L2 / Quality Gate 2"
    needs: [container-scan, iac-scan, license-check]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice::Quality Gate 2 passed — container, IaC, license checks clear."

  # -------------------------------------------------------------------------
  # LAYER 3 — Deployment Orchestration (staging + DAST)
  # -------------------------------------------------------------------------

  deploy-staging:
    name: "L3 / Deploy — Staging (Blue-Green)"
    needs: quality-gate-2
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to inactive environment
        id: deploy
        run: |
          echo "::notice::Deploying ${{ github.sha }} to staging (inactive blue-green slot)"
          # Platform-specific deployment: kubectl / helm / az webapp / aws ecs
          echo "url=https://staging.example.com" >> $GITHUB_OUTPUT

  dast-zap:
    name: "L3 / DAST — OWASP ZAP"
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: "https://staging.example.com"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: true

  quality-gate-3:
    name: "L3 / Quality Gate 3"
    needs: dast-zap
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice::Quality Gate 3 passed — DAST clean, ready for production traffic switch."

  # -------------------------------------------------------------------------
  # Production traffic switch — gated by QG3
  # -------------------------------------------------------------------------

  promote-production:
    name: "L3 / Promote — Production"
    needs: quality-gate-3
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Switch traffic to new slot
        run: |
          echo "::notice::Switching production traffic from blue -> green"
          # kubectl patch service / az webapp traffic / aws route53 weighted routing
      - name: Post-switch health check (30 min window)
        run: |
          echo "Monitoring error rate for 30 minutes (1% SLO)"

  # -------------------------------------------------------------------------
  # LAYER 4 — AI Synchronization (webhook trigger)
  # -------------------------------------------------------------------------

  trigger-ai-sync:
    name: "L4 / AI Sync — Trigger"
    needs: promote-production
    runs-on: ubuntu-latest
    steps:
      - name: Notify ASCEND Sync service
        if: env.ASCEND_SYNC_WEBHOOK != ''
        env:
          ASCEND_SYNC_WEBHOOK: ${{ secrets.ASCEND_SYNC_WEBHOOK }}
        run: |
          curl -sS -X POST "$ASCEND_SYNC_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\",\"trigger\":\"post-deploy\"}"
